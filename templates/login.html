{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>Noctowl | The Kira Codex</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Uncial+Antiqua&display=swap"
        rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            font-family: 'Cinzel', serif;
            color: #fdf6e3;
            background: radial-gradient(circle at 50% 30%, #1e293b 0%, #000 85%);
        }

        /* 🌕 Moon */
        .moon {
            position: absolute;
            top: 60px;
            right: 120px;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff 30%, #fcd34d 70%);
            box-shadow: 0 0 80px rgba(255, 215, 0, 0.6);
        }

        /* ✨ Floating magical particles */
        .particles span {
            position: absolute;
            width: 4px;
            height: 4px;
            background: gold;
            border-radius: 50%;
            animation: float 12s linear infinite;
            opacity: 0.7;
        }

        @keyframes float {
            from {
                transform: translateY(100vh) scale(0.5);
            }

            to {
                transform: translateY(-10vh) scale(1.2);
            }
        }

        /* 🌲 Forest silhouette */
        .forest {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 300px;
            background: linear-gradient(to top, #000 40%, transparent);
        }

        .tree {
            position: absolute;
            bottom: 0;
            width: 40px;
            height: 240px;
            background: #0f172a;
        }

        .tree::before {
            content: '';
            position: absolute;
            bottom: 200px;
            left: -80px;
            width: 200px;
            height: 140px;
            background: #111827;
            border-radius: 50%;
        }

        .t1 {
            left: 20%;
        }

        .t2 {
            left: 55%;
            height: 280px;
        }

        /* 🦉 Owl animation */
        .owl {
            position: absolute;
            bottom: 260px;
            left: 22%;
            width: 110px;
            animation: owlMove 10s ease-in-out infinite alternate;
            filter: drop-shadow(0 0 20px gold);
        }

        @keyframes owlMove {
            from {
                transform: translateX(0px);
            }

            to {
                transform: translateX(280px);
            }
        }

        /* 📚 Glowing book */
        .book-glow {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 40px;
            background: gold;
            border-radius: 50%;
            filter: blur(35px);
            opacity: 0.5;
        }

        /* 🎬 Intro Fade */
        .intro-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 20;
            animation: introFade 4s forwards;
        }

        @keyframes introFade {
            0% {
                opacity: 1;
            }

            80% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                visibility: hidden;
            }
        }

        .intro-title {
            font-size: 3rem;
            font-family: 'Uncial Antiqua', cursive;
            letter-spacing: 4px;
            color: gold;
            text-shadow: 0 0 25px gold;
        }

        /* 🟡 Login Card */
        .login-container {
            position: relative;
            z-index: 5;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            width: 460px;
            padding: 45px;
            border-radius: 25px;
            background: rgba(0, 0, 0, 0.88);
            border: 2px solid gold;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.6);
            text-align: center;
        }

        .login-logo {
            width: 200px;
            animation: glow 3s infinite alternate;
        }

        @keyframes glow {
            from {
                filter: drop-shadow(0 0 10px gold);
            }

            to {
                filter: drop-shadow(0 0 30px gold);
            }
        }

        h3 {
            margin-top: 20px;
            letter-spacing: 2px;
            color: gold;
        }

        .form-control {
            background: #1e1e2f;
            border: 1px solid gold;
            color: white;
        }

        .form-control:focus {
            border-color: gold;
            box-shadow: 0 0 10px gold;
            background: #1e1e2f;
            color: white;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6) !important;
            opacity: 1;
        }

        /* Fix webkit dark mode autofill creating invisible text */
        .form-control:-webkit-autofill,
        .form-control:-webkit-autofill:hover,
        .form-control:-webkit-autofill:focus,
        .form-control:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px #1e1e2f inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        .btn-gold {
            background: gold;
            border: none;
            font-weight: bold;
        }

        .btn-gold:hover {
            background: #fcd34d;
            box-shadow: 0 0 20px gold;
        }

        a {
            color: gold;
        }
    </style>
</head>

<body>

    <!-- 🌕 Moon -->
    <div class="moon"></div>

    <!-- 📚 Glowing Book Light -->
    <div class="book-glow"></div>

    <!-- 🎬 Cinematic Intro -->
    <div class="intro-screen">
        <div class="intro-title">NOCTOWL</div>
        <div class="mt-3">The Kira Codex Library</div>
    </div>

    <!-- 🎵 Soft Ambient Music -->
    <audio id="bgMusic" loop>
        <source src="{% static 'audio/intro.mp3' %}" type="audio/mpeg">
    </audio>

    <script>
        document.body.addEventListener('click', function () {
            document.getElementById('bgMusic').play();
        });
    </script>

    <!-- LOGIN -->
    <div class="login-container">

        <div class="login-card">

            <img src="{% static 'images/noctowl_logo.png' %}" class="login-logo">

            <h3>Enter The Codex</h3>

            <form method="POST" class="mt-4">
                {% csrf_token %}
                <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>
                <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>
                <button type="submit" class="btn btn-gold w-100">Unlock Library</button>
            </form>

            <div class="mt-3">
                <a href="{% url 'register' %}">Create Account</a>
            </div>

        </div>

    </div>

</body>

</html>
