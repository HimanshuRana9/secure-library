{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>Register | Noctowl Codex</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .form-control {
            background: #1e1e2f;
            border: 1px solid #ffc107;
            color: white;
        }

        .form-control:focus {
            border-color: #ffc107;
            box-shadow: 0 0 10px rgba(255, 193, 7, 0.5);
            background: #1e1e2f;
            color: white;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6) !important;
            opacity: 1;
        }

        .form-control:-webkit-autofill,
        .form-control:-webkit-autofill:hover,
        .form-control:-webkit-autofill:focus,
        .form-control:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px #1e1e2f inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
</head>

<body class="bg-dark text-white d-flex justify-content-center align-items-center" style="height:100vh;">

    <div class="card shadow p-4" style="width:400px; background:#111; border:none;">

        <!-- Logo -->
        <div class="text-center mb-4">
            <img src="{% static 'images/noctowl_logo.png' %}" style="width:90px;">
            <h4 class="mt-3">NOCTOWL</h4>
            <small>The Kira Codex Library</small>
        </div>

        <!-- Register Form -->
        <form method="POST" autocomplete="off">
            {% csrf_token %}

            <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>

            <input type="email" name="email" class="form-control mb-3" placeholder="Email Address" required>

            <input type="password" name="password1" class="form-control mb-3" placeholder="Password" required>
            <input type="password" name="password2" class="form-control mb-3" placeholder="Confirm Password" required>
            <input type="text" name="mobile_number" class="form-control mb-3" placeholder="Mobile Number (Optional)">
            <input type="text" name="location" class="form-control mb-4" placeholder="City / Location (Optional)">

            <button type="submit" class="btn btn-warning w-100">
                Create Account
            </button>

        </form>

        <!-- Back to Login -->
        <div class="mt-3 text-center">
            Already have an account?
            <a href="{% url 'login' %}" class="text-warning">Login</a>
        </div>

    </div>

</body>

</html>
